# Resolvers: Railway's embedded Docker DNS first, Google DNS as fallback.
# 127.0.0.11 handles .railway.internal names inside the private network;
# 8.8.8.8 is used when the embedded resolver is unavailable.
resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gracefully handle upstream errors
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location /api/ {
        # BACKEND_HOST is substituted at container start by docker-entrypoint.sh.
        # Default: albumweb-backend.railway.internal  (Railway private network).
        # Override by setting the BACKEND_HOST environment variable on the service.
        set $backend "http://${BACKEND_HOST}:8080";
        # When proxy_pass uses a variable, nginx does not append the URI
        # automatically — $request_uri must be passed explicitly so that
        # /api/auth/login reaches the backend as /api/auth/login.
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffering settings
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
        proxy_busy_buffers_size 64k;

        # Retry on connection-level failures (not on POST to avoid duplicate writes)
        proxy_next_upstream   error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Exact match for /api (no trailing slash) — redirect to /api/
    location = /api {
        return 301 /api/;
    }
}

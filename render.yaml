services:
  - type: web
    name: albumweb-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://albumweb-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

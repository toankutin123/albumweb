[railway]
  plugin = "nixpacks"

[build]
  builder = "nixpacks"
  nixpacksVersion = "1.36.0"

# Backend service
[[services]]
  name = "backend"
  dockerfile = "backend/Dockerfile"
  port = 5000
  healthcheckPath = "/"
  healthcheckTimeout = 30
  envVars = []

# Frontend service  
[[services]]
  name = "frontend"
  dockerfile = "frontend/Dockerfile"
  port = 80
  envVars = []

# Nixpacks configuration for backend
[nixpacks]
  [[nixpacks.build.params]]
    name = "BACKEND_PORT"
    value = "5000"
